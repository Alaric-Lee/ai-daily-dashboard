<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI每日资讯仪表盘</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h1, h2, h3 {
            color: #2c3e50;
        }
        a {
            color: #3498db;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f2f2f2;
        }
        .post-list {
            list-style-type: none;
            padding: 0;
        }
        .post-list li {
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #eee;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>AI每日资讯仪表盘</h1>
    <h2>最近更新</h2>
    <ul class="post-list">
        <!-- 这里会通过JavaScript动态生成 -->
    </ul>
    
    <script>
        // 读取README.md文件并解析内容
        fetch('README.md')
            .then(response => response.text())
            .then(text => {
                // 提取链接列表
                const lines = text.split('\n');
                const linkList = document.querySelector('.post-list');
                
                lines.forEach(line => {
                    if (line.startsWith('- [')) {
                        const match = line.match(/\[(.*?)\]\((.*?)\)/);
                        if (match) {
                            const date = match[1];
                            const url = match[2];
                            const li = document.createElement('li');
                            const a = document.createElement('a');
                            a.href = url;
                            a.textContent = date;
                            li.appendChild(a);
                            linkList.appendChild(li);
                        }
                    }
                });
            });
    </script>
</body>
</html>
